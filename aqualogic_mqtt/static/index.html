<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- Keep existing viewport and add viewport-fit for iOS safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Hayward PL-PLUS Controller</title>
  <style>
    /* MOBILE-FIRST TUNING */
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100svh; /* mobile Safari small viewport height */
      min-height: calc(var(--vh, 1vh) * 100); /* JS fallback for iOS */
      margin: 0;
      background-color: #e0f7fa;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
      touch-action: manipulation;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }
    .panel {
      background-color: #333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      text-align: center;
      width: min(92vw, 480px); /* responsive width, nice on iPhone screens */
      max-width: 480px;
      margin: clamp(12px, 3vh, 28px) 0;
    }
    .display {
      background-color: #d4edda; /* soft green LCD look */
      color: #000;
      padding: clamp(10px, 2vh, 16px);
      margin-bottom: 12px;
      font-size: clamp(16px, 2.5vh, 20px);
      line-height: 1.2;
      border-radius: 8px;
      text-align: left;
      white-space: nowrap;     /* single line */
      overflow: hidden;
      text-overflow: ellipsis; /* avoid horizontal cut-off */
      min-height: 2.2em;
    }
    .controls-row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 12px;
      gap: 12px;
    }
    .nav-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      width: min(60vw, 220px);
      min-width: 200px;
      margin: 0;
    }
    button {
      background-color: #00bcd4;
      border: none;
      padding: 10px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      border-radius: 10px;
      user-select: none;
      min-width: 44px;
      min-height: 44px; /* Apple HIG minimum */
      font-size: clamp(16px, 2.2vh, 18px);
    }
    button:hover { background-color: #0097a7; }
    button:disabled {
      opacity: .35;
      cursor: not-allowed;
      filter: grayscale(.65);
    }
    button:disabled:hover { background-color: #00bcd4; }
    .up-button    { grid-column: 2; grid-row: 1; }
    .left-button  { grid-column: 1; grid-row: 2; }
    .center-button{ grid-column: 2; grid-row: 2; }
    .right-button { grid-column: 3; grid-row: 2; }
    .down-button  { grid-column: 2; grid-row: 3; }

    .status {
      color: #ddd;
      font-size: 12px;
      margin-top: 10px;
      opacity: .9;
    }
    .control-lock {
      margin-top: 10px;
      padding: 9px 10px;
      color: #fff4dc;
      background: #7a4d00;
      border: 1px solid #d99a2b;
      border-radius: 8px;
      font: 700 12px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: left;
    }
    .control-lock[hidden] { display: none; }

    .direct-controls {
      margin-top: 16px;
      color: #f3f7f8;
      text-align: left;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .direct-controls h2 {
      margin: 12px 0 7px;
      font-size: 13px;
    }
    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }
    .button-grid.switches { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .direct-controls button {
      background: #4c6570;
      font-size: 13px;
      padding: 8px 5px;
    }
    .direct-controls button.active { background: #2e9d55; }
    .direct-controls button.pending,
    .direct-controls button.pending:disabled {
      background: #c07c18;
      opacity: 1;
      filter: none;
    }
    .direct-controls button:disabled { opacity: .45; cursor: not-allowed; }
    .equipment-state {
      min-height: 1.2em;
      color: #b7c6ca;
      font-size: 12px;
      margin-top: 8px;
    }

    .default-menu {
      margin-top: 16px;
      color: #f3f7f8;
      text-align: left;
    }
    .default-menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .default-menu-title {
      font-size: 13px;
      font-weight: 700;
    }
    .cache-state {
      color: #b7c6ca;
      font-size: 12px;
      white-space: nowrap;
    }
    .cache-state.fresh { color: #9be29f; }
    .cache-state.stale { color: #ffcc80; }
    .default-menu-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      overflow: hidden;
      border-radius: 8px;
      background: #232323;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .default-menu-table th,
    .default-menu-table td {
      padding: 7px 8px;
      border-bottom: 1px solid #3b3b3b;
      font-size: 12px;
      line-height: 1.25;
      vertical-align: middle;
    }
    .default-menu-table th {
      color: #b7c6ca;
      font-weight: 600;
      background: #292929;
    }
    .default-menu-table td {
      color: #f3f7f8;
    }
    .default-menu-table tr:last-child td { border-bottom: 0; }
    .default-menu-table .col-name { width: 42%; }
    .default-menu-table .col-value { width: 34%; }
    .default-menu-table .col-age { width: 24%; text-align: right; }
    .default-menu-table tr.stale td {
      color: #a8b2b5;
    }
    .default-menu-table tr.stale td:last-child {
      color: #ffcc80;
    }

    /* Very small screens: let the navigation pad fill the panel. */
    @media (max-width: 420px) {
      .controls-row {
        flex-direction: column;
        align-items: stretch;
      }
      .nav-buttons {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="display" id="display">Heater1 Auto Control</div>

    <div class="controls-row">
      <div class="nav-buttons">
        <button class="up-button"     data-k="plus">+</button>
        <button class="left-button"   data-k="left">&lt;</button>
        <button class="center-button" data-k="menu">Menu</button>
        <button class="right-button"  data-k="right">&gt;</button>
        <button class="down-button"   data-k="minus">−</button>
      </div>
    </div>

    <div class="status" id="status">Connecting…</div>
    <div class="control-lock" id="control-lock" role="status" aria-live="polite" hidden></div>

    <section class="direct-controls" aria-label="Direct PL-PLUS controls">
      <h2>Mode</h2>
      <div class="button-grid" id="mode-controls">
        <button data-mode="pool">Pool</button>
        <button data-mode="spa">Spa</button>
        <button data-mode="spillover">Spillover</button>
      </div>

      <h2>Pump Speed</h2>
      <div class="button-grid" id="speed-controls">
        <button data-speed="speed1">Speed 1</button>
        <button data-speed="speed2">Speed 2</button>
        <button data-speed="speed3">Speed 3</button>
        <button data-speed="speed4">Speed 4</button>
        <button data-speed-clear="true">Resume Sch</button>
      </div>

      <h2>Equipment</h2>
      <div class="button-grid switches" id="switch-controls">
        <button data-switch="auto_heat">Auto Heat</button>
        <button data-switch="heater_relay">Heater Relay</button>
        <button data-switch="lights">Lights</button>
        <button data-switch="blower">Blower</button>
      </div>
      <div class="equipment-state" id="equipment-state">Loading controller state…</div>
    </section>

    <div class="default-menu">
      <div class="default-menu-header">
        <div class="default-menu-title">Recent Values</div>
        <div class="cache-state stale" id="cache-state">Incomplete</div>
      </div>
      <table class="default-menu-table" aria-label="Recent PL-PLUS default-menu values">
        <thead>
          <tr>
            <th class="col-name">Value</th>
            <th class="col-value">Reading</th>
            <th class="col-age">Age</th>
          </tr>
        </thead>
        <tbody id="default-menu-rows">
          <tr class="stale"><td colspan="3">Waiting for data</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
  // iOS Safari dynamic viewport height fix
  function setVhUnit(){
    const vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
  }
  window.addEventListener('resize', setVhUnit);
  window.addEventListener('orientationchange', setVhUnit);
  setVhUnit();

  const displayEl = document.getElementById('display');
  const statusEl  = document.getElementById('status');
  const cacheStateEl = document.getElementById('cache-state');
  const defaultRowsEl = document.getElementById('default-menu-rows');
  const equipmentStateEl = document.getElementById('equipment-state');
  const controlLockEl = document.getElementById('control-lock');
  const panelEl = document.querySelector('.panel');
  let equipmentState = null;
  let pendingControl = null;
  let controlsLocked = false;
  const COMMAND_TIMEOUT_MS = 180000;

  function commandCompleted(state, command) {
    if (!command?.accepted || state.controls_locked === true || state.busy === true) return false;
    if (command.kind === 'mode') {
      return state.mode === command.target && state.target_mode == null;
    }
    if (command.kind === 'switch') {
      return state[command.control] === command.target;
    }
    if (command.kind === 'speed') {
      const phase = state.vsp?.phase;
      if (command.target != null) {
        return state.vsp?.target_name === command.target && phase === 'holding';
      }
      const manualSpeed = state.automation?.manual_override?.pump_preset;
      const scheduledTarget = state.automation?.desired?.pump_preset;
      return !manualSpeed && scheduledTarget != null
        && state.vsp?.target_name === scheduledTarget
        && phase === 'holding';
    }
    return false;
  }

  function reconcilePendingControl(state) {
    if (!pendingControl) return;
    if (Date.now() - pendingControl.startedAt > COMMAND_TIMEOUT_MS) {
      pendingControl = null;
      equipmentStateEl.textContent = 'Command confirmation timed out';
      return;
    }
    if (commandCompleted(state, pendingControl)) pendingControl = null;
  }

  function setButtonState(button, {active = false, pending = false} = {}) {
    button.classList.toggle('active', active);
    button.classList.toggle('pending', pending);
    button.setAttribute('aria-pressed', active ? 'true' : 'false');
    button.setAttribute('aria-busy', pending ? 'true' : 'false');
  }

  function collapseLines(lines) {
    // Trim each piece, drop NULs, collapse multi-spaces
    const parts = (lines || [])
      .filter(Boolean)
      .map(s => String(s).replace(/\x00/g, '').trim());
    const text = parts.join(' ').replace(/\s{2,}/g, ' ');
    return text.trim();
  }

  async function poll() {
    try {
      const res = await fetch('/api/display', { cache: 'no-store' });
      if (!res.ok) throw new Error(res.statusText);
      const j = await res.json();
      displayEl.textContent = collapseLines(j.lines) || '\u00a0';
      statusEl.textContent = `Updated ${new Date(j.updated_at * 1000).toLocaleTimeString()}`;
    } catch (e) {
      statusEl.textContent = 'Disconnected';
    } finally {
      setTimeout(poll, 600);
    }
  }

  function formatAge(seconds) {
    if (seconds == null || !Number.isFinite(seconds)) return '--';
    if (seconds < 1) return 'now';
    if (seconds < 60) return `${Math.round(seconds)}s`;
    return `${Math.round(seconds / 60)}m`;
  }

  function renderDefaultMenu(cache) {
    const rows = (cache.rows || []).filter(row => row.observed_at != null || [
      'poolSpaMode',
      'poolTempF',
      'ambientF',
      'poolChlorinatorPct',
      'saltPpm',
      'heater1Status',
      'filterState',
      'pumpSpeedPct',
      'pumpSpeedName'
    ].includes(row.key));

    defaultRowsEl.replaceChildren();
    if (!rows.length) {
      const tr = document.createElement('tr');
      tr.className = 'stale';
      const td = document.createElement('td');
      td.colSpan = 3;
      td.textContent = 'Waiting for data';
      tr.appendChild(td);
      defaultRowsEl.appendChild(tr);
      return;
    }

    const frag = document.createDocumentFragment();
    rows.forEach(row => {
      const tr = document.createElement('tr');
      if (!row.fresh) tr.className = 'stale';

      const name = document.createElement('td');
      name.textContent = row.label || row.key;
      const value = document.createElement('td');
      value.textContent = row.display || '--';
      const age = document.createElement('td');
      age.className = 'col-age';
      age.textContent = formatAge(row.age_sec);

      tr.append(name, value, age);
      frag.appendChild(tr);
    });
    defaultRowsEl.appendChild(frag);
  }

  async function pollDefaultMenu() {
    try {
      const res = await fetch('/api/default-menu', { cache: 'no-store' });
      if (!res.ok) throw new Error(res.statusText);
      const cache = await res.json();
      renderDefaultMenu(cache);
      cacheStateEl.textContent = cache.fresh ? 'Fresh' : (cache.complete ? 'Stale' : 'Incomplete');
      cacheStateEl.className = `cache-state ${cache.fresh ? 'fresh' : 'stale'}`;
    } catch (e) {
      cacheStateEl.textContent = 'Unavailable';
      cacheStateEl.className = 'cache-state stale';
    } finally {
      setTimeout(pollDefaultMenu, 1000);
    }
  }

  function renderEquipment(state) {
    equipmentState = state;
    reconcilePendingControl(state);
    const automationEnabled = state.automation?.enabled === true;
    // The backend excludes a scheduled VSP `holding` lease from this flag.
    // Only active hardware/menu reconciliation locks manual WebUI input.
    controlsLocked = state.controls_locked === true || pendingControl !== null;
    controlLockEl.hidden = !controlsLocked;
    controlLockEl.textContent = pendingControl
      ? 'Command in progress — controls temporarily locked'
      : `${state.control_lock_reason || 'Automated control in progress'} — controls temporarily locked`;
    panelEl.setAttribute('aria-busy', controlsLocked ? 'true' : 'false');
    document.querySelectorAll('button[data-k]').forEach(btn => {
      btn.disabled = controlsLocked;
    });

    const blocked = !state.available || state.service_mode || controlsLocked;
    const localModePending = pendingControl?.kind === 'mode' ? pendingControl.target : null;
    const modePending = localModePending ?? state.target_mode ?? null;
    document.querySelectorAll('button[data-mode]').forEach(btn => {
      setButtonState(btn, {
        active: modePending == null && btn.dataset.mode === state.mode,
        pending: btn.dataset.mode === modePending,
      });
      btn.disabled = blocked;
    });
    document.querySelectorAll('button[data-switch]').forEach(btn => {
      const isPoolHeat = btn.dataset.switch === 'auto_heat' && automationEnabled;
      const active = isPoolHeat
        ? state.automation?.pool_heat_enabled === true
        : state[btn.dataset.switch] === true;
      const switchPending = pendingControl?.kind === 'switch'
        && pendingControl.control === btn.dataset.switch;
      setButtonState(btn, {active: !switchPending && active, pending: switchPending});
      btn.disabled = blocked;
    });
    const localSpeedPending = pendingControl?.kind === 'speed' ? pendingControl : null;
    const backendSpeedPending = state.vsp?.busy && state.vsp?.phase !== 'holding'
      ? state.vsp?.target_name
      : null;
    const speedGroupPending = localSpeedPending !== null || backendSpeedPending != null;
    const pendingSpeedTarget = localSpeedPending ? localSpeedPending.target : backendSpeedPending;
    document.querySelectorAll('button[data-speed]').forEach(btn => {
      setButtonState(btn, {
        active: !speedGroupPending && btn.dataset.speed === state.vsp?.target_name,
        pending: pendingSpeedTarget != null && btn.dataset.speed === pendingSpeedTarget,
      });
      btn.disabled = blocked || (!automationEnabled && !state.vsp?.enabled);
    });
    const release = document.querySelector('button[data-speed-clear]');
    const manualSpeed = state.automation?.manual_override?.pump_preset;
    const releasePending = localSpeedPending !== null && localSpeedPending.target == null;
    const scheduleActive = automationEnabled ? !manualSpeed : !state.vsp?.busy;
    setButtonState(release, {
      active: !speedGroupPending && scheduleActive,
      pending: releasePending,
    });
    release.disabled = blocked || (!state.vsp?.busy && !manualSpeed);

    const details = [];
    if (state.service_mode) details.push('Service mode: controls inhibited');
    else details.push(`Mode: ${state.mode || 'unknown'}`);
    if (state.vsp?.requested_speed_pct != null) details.push(`Pump: ${state.vsp.requested_speed_pct}%`);
    if (!state.vsp?.enabled) details.push('Speed driver disabled');
    if (state.last_error) details.push(state.last_error);
    if (state.vsp?.last_error) details.push(state.vsp.last_error);
    equipmentStateEl.textContent = details.join(' · ');
  }

  async function pollEquipment() {
    try {
      const res = await fetch('/api/equipment', { cache: 'no-store' });
      if (!res.ok) throw new Error(res.statusText);
      renderEquipment(await res.json());
    } catch (e) {
      equipmentStateEl.textContent = 'Equipment state unavailable';
    } finally {
      setTimeout(pollEquipment, 1000);
    }
  }

  async function postControl(path, body, method = 'POST', command = null) {
    const commandToken = command ? `${Date.now()}-${Math.random()}` : null;
    if (command) {
      pendingControl = {...command, token: commandToken, accepted: false, startedAt: Date.now()};
    }
    if (equipmentState) renderEquipment(equipmentState);
    try {
      const res = await fetch(path, {
        method,
        headers: {'Content-Type': 'application/json'},
        body: method === 'DELETE' ? undefined : JSON.stringify(body)
      });
      const result = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(result.error || res.statusText);
      if (pendingControl?.token === commandToken) pendingControl.accepted = true;
      equipmentStateEl.textContent = 'Command accepted';
    } catch (e) {
      if (pendingControl?.token === commandToken) pendingControl = null;
      equipmentStateEl.textContent = `Command failed: ${e.message}`;
    } finally {
      if (equipmentState) renderEquipment(equipmentState);
    }
  }

  document.querySelectorAll('button[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => postControl(
      '/api/control/mode',
      {target: btn.dataset.mode},
      'POST',
      {kind: 'mode', target: btn.dataset.mode}
    ));
  });
  document.querySelectorAll('button[data-switch]').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.switch;
      const automationEnabled = equipmentState?.automation?.enabled === true;
      const current = name === 'auto_heat' && automationEnabled
        ? equipmentState?.automation?.pool_heat_enabled === true
        : equipmentState?.[name] === true;
      const target = !current;
      postControl(
        '/api/control/switch',
        {control: name, target},
        'POST',
        {kind: 'switch', control: name, target}
      );
    });
  });
  document.querySelectorAll('button[data-speed]').forEach(btn => {
    btn.addEventListener('click', () => postControl(
      '/api/control/pump-speed',
      {target: btn.dataset.speed, lease_seconds: 900},
      'POST',
      {kind: 'speed', target: btn.dataset.speed}
    ));
  });
  document.querySelector('button[data-speed-clear]').addEventListener('click', () => {
    postControl('/api/vsp/speed', {}, 'DELETE', {kind: 'speed', target: null});
  });

  async function sendKey(k) {
    if (controlsLocked) {
      statusEl.textContent = 'Manual key blocked by active controller work';
      return;
    }
    if (k === 'filter' && equipmentState?.automation?.enabled) {
      return postControl('/api/control/switch', {
        control: 'filter',
        target: equipmentState.filter_on !== true
      });
    }
    try {
      const res = await fetch(`/api/key/${encodeURIComponent(k)}`, { method: 'POST' });
      const result = await res.json().catch(() => ({}));
      if (!res.ok || result.ok !== true) {
        statusEl.textContent = 'Manual key blocked by active controller work';
      }
    } catch (_) {
      statusEl.textContent = 'Manual key request failed';
    }
  }

  // Click handlers for all buttons
  document.querySelectorAll('button[data-k]').forEach(btn => {
    btn.addEventListener('click', () => sendKey(btn.dataset.k));
  });

  // Keyboard shortcuts (desktop convenience)
  window.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    if (e.key === 'ArrowLeft')  return sendKey('left');
    if (e.key === 'ArrowRight') return sendKey('right');
    if (e.key === '-' )         return sendKey('minus');
    if (e.key === '=' || e.key === '+') return sendKey('plus');
    if (e.key === 'm' || e.key === 'M')  return sendKey('menu');
    if (e.key === 'p' || e.key === 'P')  return sendKey('pool_spa'); // Pool/Spa shortcut
  });

  poll();
  pollDefaultMenu();
  pollEquipment();
  </script>
</body>
</html>
